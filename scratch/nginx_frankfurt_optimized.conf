upstream alexhost_backend {
    server 213.232.235.181:3001;
    keepalive 64;
}

# 🚀 NGINX STATIC CACHE ZONE
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=hydra_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 🚀 STATIC ASSET CACHING (LOCAL TO FRANKFURT)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://alexhost_backend;
        proxy_cache hydra_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
        expires 365d;
    }

    location / {
        proxy_pass http://alexhost_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
