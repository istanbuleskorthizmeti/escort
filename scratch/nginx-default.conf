upstream alexhost_nextjs {
    server 213.232.235.181:3001;
    keepalive 32;
}

upstream alexhost_nginx {
    server 213.232.235.181:80;
    keepalive 32;
}

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=hydra_cache:100m max_size=10g inactive=60m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # 🚀 NUCLEAR COMPRESSION
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 🚀 OPTIMIZED HEADERS
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-DRKCNAY-Edge "Frankfurt-Nuclear-v5-PageSpeed";

    # 🖼️ AGGRESSIVE STATIC CACHING
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://alexhost_nginx;
        proxy_cache hydra_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        add_header X-Cache-Status $upstream_cache_status;
        expires 365d;
    }

    # 🧛‍♂️ MICRO-CACHING FOR HTML
    location / {
        proxy_pass http://alexhost_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache hydra_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_bypass $http_upgrade;
        
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
