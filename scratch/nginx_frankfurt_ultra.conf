
# 🌀 DRKCNAY HYDRA: FRANKFURT EDGE CACHE (ULTRA-AGGRESSIVE)
upstream alexhost_nextjs {
    server 213.232.235.181:3001;
    keepalive 64;
}

upstream alexhost_nginx {
    server 213.232.235.181:80;
    keepalive 32;
}

# 🚀 CACHE ZONE: 30 days inactivity, 5GB max size
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=hydra_cache:20m max_size=5g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 🚀 STATIC ASSET CACHING (Point to Alexhost Nginx for rewrites)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://alexhost_nginx;
        proxy_cache hydra_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        add_header X-Cache-Status $upstream_cache_status;
        add_header X-DRKCNAY-Edge "Frankfurt-Alpha";
        expires 365d;
    }

    # 🚀 DYNAMIC CONTENT (Point to Next.js)
    location / {
        proxy_pass http://alexhost_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
