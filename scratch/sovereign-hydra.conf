
# ==============================================================================
# ⚡ DRKCNAY ELITE HYDRA CONFIGURATION - GOD MODE
# ==============================================================================

# [GLOBAL] Define upstream for PM2 Next.js Cluster
upstream drkcnay_nextjs {
    # Assuming PM2 cluster is listening on 3000
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# [REDIRECT] HTTP to HTTPS (Handled mostly by Cloudflare, but fallback)
server {
    listen 80;
    server_name avrupayakasiescort.shop bagcilarescort.shop besiktasescort.blog besiktasescort.fun besiktasescorthizmeti.shop beylikduzuescortlistesi.shop bucaescorthizmeti.shop esenyurtescort.blog esenyurtescorthizmeti.shop iqostobacco.net istanbulescort.blog istanbulescorthizmeti.shop izmitescorthizmeti.shop kadikoyescort.shop kucukcekmecescort.shop pendikescorthizmeti.shop sefakoyescorthizmeti.shop sisliescort.shop taksimescorthizmeti.shop vipescorthizmeti.com vipescorthizmeti.shop www.avrupayakasiescort.shop www.bagcilarescort.shop www.besiktasescort.blog www.besiktasescort.fun www.besiktasescorthizmeti.shop www.beylikduzuescortlistesi.shop www.bucaescorthizmeti.shop www.esenyurtescort.blog www.esenyurtescorthizmeti.shop www.iqostobacco.net www.istanbulescort.blog www.istanbulescorthizmeti.shop www.izmitescorthizmeti.shop www.kadikoyescort.shop www.kucukcekmecescort.shop www.pendikescorthizmeti.shop www.sefakoyescorthizmeti.shop www.sisliescort.shop www.taksimescorthizmeti.shop www.vipescorthizmeti.com www.vipescorthizmeti.shop;
    return 301 https://$host$request_uri;
}

# [MAIN SERVER BLOCK]
server {
    listen 443 ssl http2;
    server_name avrupayakasiescort.shop bagcilarescort.shop besiktasescort.blog besiktasescort.fun besiktasescorthizmeti.shop beylikduzuescortlistesi.shop bucaescorthizmeti.shop esenyurtescort.blog esenyurtescorthizmeti.shop iqostobacco.net istanbulescort.blog istanbulescorthizmeti.shop izmitescorthizmeti.shop kadikoyescort.shop kucukcekmecescort.shop pendikescorthizmeti.shop sefakoyescorthizmeti.shop sisliescort.shop taksimescorthizmeti.shop vipescorthizmeti.com vipescorthizmeti.shop www.avrupayakasiescort.shop www.bagcilarescort.shop www.besiktasescort.blog www.besiktasescort.fun www.besiktasescorthizmeti.shop www.beylikduzuescortlistesi.shop www.bucaescorthizmeti.shop www.esenyurtescort.blog www.esenyurtescorthizmeti.shop www.iqostobacco.net www.istanbulescort.blog www.istanbulescorthizmeti.shop www.izmitescorthizmeti.shop www.kadikoyescort.shop www.kucukcekmecescort.shop www.pendikescorthizmeti.shop www.sefakoyescorthizmeti.shop www.sisliescort.shop www.taksimescorthizmeti.shop www.vipescorthizmeti.com www.vipescorthizmeti.shop;

    # We rely on Cloudflare's Origin CA or Flexible SSL for this to work out-of-the-box
    # If using Full (Strict), you must deploy CF Origin Certs to /etc/ssl/cloudflare/
    # For now, assuming Cloudflare is managing edge SSL and Nginx accepts HTTP locally if behind a reverse tunnel,
    # OR we use a self-signed / generic cert that CF accepts.
    # To keep it bulletproof immediately without cert generation, we'll listen on 80 and let CF proxy to 80 via 'Flexible' SSL.
    # NOTE: Below is optimized for 'Flexible' or 'Full' if certs exist. We will write for port 80 proxying to ensure 100% uptime on first boot.

    # 🛡️ SECURITY HEADERS (Strict)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Custom Header for identification
    add_header X-DRKCNAY-Node "Hydra-Alpha" always;

    # 🚀 AGGRESSIVE CACHING FOR STATIC ASSETS (WebP, CSS, JS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?|eot|ttf)$ {
        proxy_pass http://drkcnay_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        expires 30d;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # ⚡ NEXT.JS SYSTEM FILES (_next)
    location /_next/ {
        proxy_pass http://drkcnay_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        expires max;
        access_log off;
    }

    # 🎯 DYNAMIC ROUTES & CLOAKER (NO CACHE)
    # The Cloaker MUST NOT be cached by Nginx, otherwise it breaks.
    location / {
        proxy_pass http://drkcnay_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cloaker Protection: Do not cache HTML responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;

        # Timeouts for heavy AI generation if any
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
